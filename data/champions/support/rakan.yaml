profile:
  draftIdentity: A mobile support who can start fights with a dash and knockup
    while also shielding and healing allies.
  synergyHooks:
    - Pairs well with allies who can follow up on his knockup and charm setup.
    - Provides shields and healing to help protect a carry during skirmishes.
  threatHooks:
    - Can be punished if his engage is interrupted before he reaches the target.
    - His ally-focused shield and repositioning are less valuable against
      compositions that can burst through his protection.
  uncertainties:
